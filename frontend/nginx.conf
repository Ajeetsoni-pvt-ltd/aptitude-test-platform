# Frontend container Nginx — serves Vite build with SPA routing
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 256;

  # SPA routing: all routes fall back to index.html
  # This is CRITICAL for /verify-email, /reset-password, /forgot-password etc.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache static assets aggressively (Vite adds hashes to filenames)
  location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }
}
