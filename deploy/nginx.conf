# ─────────────────────────────────────────
# Upstreams
# ─────────────────────────────────────────
upstream frontend_upstream {
  server aptitude_frontend:80;
}

upstream backend_upstream {
  server aptitude_backend:5000;
}

# ─────────────────────────────────────────
# HTTP → HTTPS Redirect
# ─────────────────────────────────────────
server {
  listen 80;
  server_name aptitudetest.site www.aptitudetest.site;

  return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────
# HTTPS Server
# ─────────────────────────────────────────
server {
  listen 443 ssl;
  server_name aptitudetest.site www.aptitudetest.site;

  ssl_certificate /etc/nginx/ssl/live/aptitudetest.site/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/live/aptitudetest.site/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 25m;

  # ─── API ───────────────────────────────
  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # ─── Uploads ───────────────────────────
  location /uploads/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ─── Health ────────────────────────────
  location /health {
    proxy_pass http://backend_upstream;
  }

  # ─── Socket.IO ─────────────────────────
  location /socket.io/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # ─── Frontend — HTML ───────────────────
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # ─── Static Assets ─────────────────────
  location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg)$ {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept-Encoding";
  }

  # ─── Images ────────────────────────────
  location ~* \.(png|jpg|jpeg|gif|webp)$ {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Vary "Accept-Encoding";
  }
}