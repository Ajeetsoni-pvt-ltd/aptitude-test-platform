# ═══════════════════════════════════════════════════════════════
# ApptitudeTest.live — Production Nginx Configuration
# Handles: SSL termination, gzip, security headers, SPA routing,
# API reverse proxy, WebSocket, static asset caching
# ═══════════════════════════════════════════════════════════════

# ─── Upstreams ─────────────────────────────────────────────────
upstream frontend_upstream {
  server aptitude_frontend:80;
}

upstream backend_upstream {
  server aptitude_backend:5000;
}

# ─── HTTP → HTTPS Redirect ────────────────────────────────────
server {
  listen 80;
  server_name aptitudetest.site www.aptitudetest.site;

  # Let's Encrypt ACME challenge (for SSL renewal)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    allow all;
  }

  # Redirect everything else to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── HTTPS Server ─────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name aptitudetest.site www.aptitudetest.site;

  # ── SSL Certificate ───────────────────────────────────────
  ssl_certificate /etc/nginx/ssl/live/aptitudetest.site/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/live/aptitudetest.site/privkey.pem;

  # ── SSL Hardening ─────────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  # OCSP Stapling — faster SSL handshake
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 8.8.4.4 valid=300s;
  resolver_timeout 5s;

  # ── Security Headers ──────────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Request Limits ────────────────────────────────────────
  client_max_body_size 25m;
  client_body_timeout 30s;
  client_header_timeout 30s;

  # ── Gzip Compression ──────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

  # ── API Proxy ─────────────────────────────────────────────
  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts for long-running API calls
    proxy_connect_timeout 30s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Don't cache API responses
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  # ── Uploads (backend static files) ────────────────────────
  location /uploads/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # ── Health Check ──────────────────────────────────────────
  location /health {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off; # Don't log health checks
  }

  # ── Socket.IO WebSocket ───────────────────────────────────
  location /socket.io/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket timeout (keep alive for 1 hour)
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # ── Static Assets (JS, CSS, fonts) — immutable cache ─────
  location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg)$ {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Vary "Accept-Encoding";
    access_log off;
  }

  # ── Images — long cache ──────────────────────────────────
  location ~* \.(png|jpg|jpeg|gif|webp|avif)$ {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header Vary "Accept-Encoding";
    access_log off;
  }

  # ── Frontend SPA — catch-all ─────────────────────────────
  # IMPORTANT: This must be LAST. All unmatched routes go to
  # the frontend container which serves index.html via try_files
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Don't cache HTML (SPA shell must always be fresh)
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }
}