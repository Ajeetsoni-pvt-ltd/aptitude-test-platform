# ─────────────────────────────────────────
# Upstreams
# ─────────────────────────────────────────
upstream frontend_upstream {
  server frontend:80;
}

upstream backend_upstream {
  server backend:5000;
}

# ─────────────────────────────────────────
# HTTP → HTTPS Redirect
# ─────────────────────────────────────────
server {
  listen 80;
  server_name aptitudetest.site www.aptitudetest.site;

  return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────
# HTTPS Server
# ─────────────────────────────────────────
server {
  listen 443 ssl;
  server_name aptitudetest.site www.aptitudetest.site;

  # SSL Certificates
  ssl_certificate /etc/nginx/ssl/live/aptitudetest.site/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/live/aptitudetest.site/privkey.pem;

  # Basic SSL settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 25m;

  # ─── API ───────────────────────────────
  location /api/ {
    proxy_pass http://backend_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # ─── Uploads ───────────────────────────
  location /uploads/ {
    proxy_pass http://backend_upstream/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ─── Health ────────────────────────────
  location /health {
    proxy_pass http://backend_upstream/health;
  }

  # ─── Socket.IO ─────────────────────────
  location /socket.io/ {
    proxy_pass http://backend_upstream/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # ─── Frontend ──────────────────────────
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}