# ═══════════════════════════════════════════════════════════════
# ApptitudeTest.live — Production Docker Compose
# ═══════════════════════════════════════════════════════════════

services:
  # ── Nginx Reverse Proxy ──────────────────────────────────────
  proxy:
    image: nginx:1.27-alpine
    container_name: aptitude_proxy
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (Vite build served by Nginx) ────────────────────
  frontend:
    image: ghcr.io/ajeetsoni-pvt-ltd/aptitude-test-platform-frontend:${IMAGE_TAG:-latest}
    container_name: aptitude_frontend
    expose:
      - "80"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ── Backend (Node.js Express API) ────────────────────────────
  backend:
    image: ghcr.io/ajeetsoni-pvt-ltd/aptitude-test-platform-backend:${IMAGE_TAG:-latest}
    container_name: aptitude_backend
    env_file:
      - .env.production
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  backend_uploads:
  certbot_webroot: