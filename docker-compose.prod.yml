services:
  proxy:
    image: nginx:1.27-alpine
    container_name: aptitude_proxy
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  frontend:
    image: ghcr.io/ajeetsoni-pvt-ltd/aptitude-test-platform-frontend:${IMAGE_TAG:-latest}
    container_name: aptitude_frontend
    restart: unless-stopped

  backend:
    image: ghcr.io/ajeetsoni-pvt-ltd/aptitude-test-platform-backend:${IMAGE_TAG:-latest}
    container_name: aptitude_backend
    env_file:
      - .env.production
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

volumes:
  backend_uploads:
