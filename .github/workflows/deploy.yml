name: Deploy Production

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata for frontend
        id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aptitude-test-platform-frontend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Extract Docker metadata for backend
        id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/aptitude-test-platform-backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS (Zero-Downtime)
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_USERNAME: ajeetsoni-pvt-ltd
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: GHCR_OWNER,GHCR_USERNAME,GHCR_PAT
          command_timeout: 10m
          script: |
            set -e

            APP_DIR="/opt/aptitude-test-platform"
            cd "$APP_DIR"

            echo "──── 1. Pull latest code ────"
            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo "──── 2. Login to GHCR ────"
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            echo "──── 3. Pull new images ────"
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG=latest \
              docker compose -f docker-compose.prod.yml pull

            echo "──── 4. Rolling restart (zero-downtime) ────"
            # Restart backend first, wait for health check, then frontend
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG=latest \
              docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans backend

            # Wait for backend health check to pass
            echo "  Waiting for backend health..."
            for i in $(seq 1 30); do
              if docker exec aptitude_backend node -e "fetch('http://localhost:5000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))" 2>/dev/null; then
                echo "  ✅ Backend healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "  ❌ Backend health check failed — rolling back"
                docker compose -f docker-compose.prod.yml logs --tail=50 backend
                exit 1
              fi
              sleep 1
            done

            # Now update frontend and proxy
            GHCR_OWNER="$GHCR_OWNER" IMAGE_TAG=latest \
              docker compose -f docker-compose.prod.yml up -d --no-deps frontend proxy

            echo "──── 5. Cleanup ────"
            docker image prune -f

            echo "──── ✅ Deployment complete ────"
            docker compose -f docker-compose.prod.yml ps